<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTAS - Cleared Talent Acquisition</title>
    <style>
        body {
            background-image: url('header-wallpaper.jpeg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.5); /* Darkens the image slightly for readability */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .content-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 600px;
        }
        .btn {
            display: inline-block;
            background: #b22234; /* Patriotic Red */
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #3c3b6e; /* Patriotic Blue */
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="content-box">
            <h1>Cleared Talent Acquisition</h1>
            <p>Your Mission-Ready Staffing Experts for Federal Contractors</p>
            
            <a href="#" class="btn">View Open Positions</a>
            <a href="#" class="btn" style="background: #3c3b6e;">Contact a Recruiter</a>
        </div>
    </div>
</body>
</html>
