<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTAS - Comprehensive Talent Acquisition</title>
    <style>
        body {
            background-image: url('header-wallpaper.jpeg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Positions the logo in the top-left corner */
        .header-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .logo-box img {
            width: 130px; /* Adjust this to change the logo size */
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 650px;
        }

        .btn {
            display: inline-block;
            background: #b22234;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #3c3b6e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-box">
            <img src="logo.jpeg.jpeg" alt="CTAS Logo">
        </div>
    </div>

    <div class="overlay">
        <div class="content">
            <h1>Comprehensive Talent Acquisition</h1>
            <p>Your Mission-Ready Staffing Experts for Federal Contractors</p>
            <a href="#" class="btn">View Open Positions</a>
        </div>
    </div>

</body>
</html>
